<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 p-8 text-white">
  <div class="max-w-2xl mx-auto">

    <div class="flex items-center gap-4 mb-8">
      <a
        routerLink="/characters"
        class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors">
        <i class="pi pi-arrow-left"></i> Voltar para a lista
      </a>
    </div>

    <div class="mb-8">
      <h1 class="text-4xl font-black bg-gradient-to-r from-cyan-400 to-violet-400 bg-clip-text text-transparent">
        ✏️ Alterar Personagem
      </h1>
      <p class="text-slate-400 mt-1">Modifique os dados do personagem na campanha.</p>
    </div>

    <div class="bg-slate-900/70 backdrop-blur-xl border border-slate-700 rounded-3xl shadow-2xl p-6">
      <app-character-form-fields
        [(character)]="draft"
        [classes]="service.classes"
        saveLabel="Salvar Alterações"
        (save)="save()"
        (cancel)="cancel()">
      </app-character-form-fields>
    </div>

  </div>
</div>
