<p-dialog
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [style]="{ width: '520px' }"
  [draggable]="false"
  [resizable]="false"
  header="Remover Personagem"
  styleClass="rounded-3xl overflow-hidden border border-slate-700">

  @if (character(); as selectedCharacter) {
    <div class="flex flex-col gap-4">
      <p class="text-lg text-slate-200">
        Tem certeza que deseja remover
        <strong class="text-red-300">{{ selectedCharacter.name }}</strong>?
      </p>

      <p class="text-slate-400">
        Esta ação remove o personagem da lista atual e não pode ser desfeita.
      </p>

      <div class="flex justify-end gap-3 mt-4">
        <button
          type="button"
          class="px-5 py-3 rounded-xl bg-slate-700 hover:bg-slate-600 transition-all"
          (click)="cancel()">
          Cancelar
        </button>

        <button
          type="button"
          class="px-5 py-3 rounded-xl bg-red-600 hover:bg-red-500 transition-all shadow-lg"
          (click)="confirm()">
          Remover
        </button>
      </div>
    </div>
  }
</p-dialog>
