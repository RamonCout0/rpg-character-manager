<div class="min-h-screen p-8 text-white">

  <!-- HEADER -->

  <div
    class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">

    <div>
      <h1 class="text-5xl font-bold">
        🎲 RPG Character Manager
      </h1>

      <p class="text-slate-400 mt-2">
        Gerencie seus personagens de mesa
      </p>
    </div>

    <p-button
      label="Novo Personagem"
      icon="pi pi-plus"
      severity="contrast"
      (onClick)="openNew()">
    </p-button>

  </div>

  <!-- TABLE CARD -->

  <div
    class="bg-slate-900 border border-slate-700 rounded-2xl shadow-2xl overflow-hidden">

    <p-table
      [value]="characters"
      styleClass="p-datatable-striped">

      <ng-template pTemplate="header">
        <tr>
          <th class="text-lg">Nome</th>
          <th class="text-lg">Nível</th>
          <th class="text-lg">Status</th>
          <th class="text-lg">Ações</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-character>

        <tr class="hover:bg-slate-800 transition-all duration-200">

          <td>
            <div class="flex items-center gap-3">

              <div
                class="w-10 h-10 rounded-full bg-violet-500 flex items-center justify-center font-bold">

                {{ character.name.charAt(0) }}

              </div>

              <span class="font-semibold text-lg">
                {{ character.name }}
              </span>

            </div>
          </td>

          <td>

            <div
              class="bg-slate-800 px-4 py-2 rounded-xl inline-block">

              Level {{ character.level }}

            </div>

          </td>

          <td>

            @if (character.alive) {

              <span
                class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-sm">

                Vivo

              </span>

            } @else {

              <span
                class="bg-red-500/20 text-red-400 px-3 py-1 rounded-full text-sm">

                Morto

              </span>

            }

          </td>

          <td>

            <div class="flex gap-2">

              <p-button
                icon="pi pi-pencil"
                severity="contrast"
                rounded="true"
                (onClick)="editCharacter(character)">
              </p-button>

              <p-button
                icon="pi pi-trash"
                severity="danger"
                rounded="true"
                (onClick)="deleteCharacter(character.id)">
              </p-button>

            </div>

          </td>

        </tr>

      </ng-template>

    </p-table>

  </div>

</div>

<!-- DIALOG -->

<p-dialog
  [(visible)]="characterDialog"
  [modal]="true"
  [style]="{ width: '450px' }"
  [draggable]="false"
  [resizable]="false"
  header="Personagem">

  <div class="flex flex-col gap-5 mt-3">

    <!-- NOME -->

    <div class="flex flex-col gap-2">

      <label class="font-semibold">
        Nome
      </label>

      <input
        pInputText
        [(ngModel)]="character.name"
        placeholder="Ex: Arthos"
        class="w-full">
    </div>

    <!-- LEVEL -->

    <div class="flex flex-col gap-2">

      <label class="font-semibold">
        Nível
      </label>

      <p-inputnumber
        [(ngModel)]="character.level"
        [min]="1"
        class="w-full">
      </p-inputnumber>

    </div>

    <!-- STATUS -->

    <div class="flex items-center gap-3">

      <p-checkbox
        [(ngModel)]="character.alive"
        [binary]="true">
      </p-checkbox>

      <label>
        Personagem vivo
      </label>

    </div>

  </div>

  <ng-template #footer>

    <div class="flex justify-end gap-2">

      <p-button
        label="Cancelar"
        severity="secondary"
        (onClick)="hideDialog()">
      </p-button>

      <p-button
        label="Salvar"
        icon="pi pi-check"
        (onClick)="saveCharacter()">
      </p-button>

    </div>

  </ng-template>

</p-dialog>
