<div class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 p-8 text-white">
  <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8">
    <div>
      <h1 class="text-5xl font-black tracking-tight bg-gradient-to-r from-violet-400 via-cyan-400 to-fuchsia-500 bg-clip-text text-transparent drop-shadow-lg">
        🎲 RPG Character Manager
      </h1>

      <p class="text-slate-400 mt-2 text-lg">
        Gerencie seus personagens de mesa com componentes Angular reutilizáveis.
      </p>
    </div>

    <p-button
      label="Novo Personagem"
      icon="pi pi-plus"
      severity="contrast"
      styleClass="!px-6 !py-3 !rounded-2xl !font-bold shadow-xl hover:scale-105 transition-all"
      (onClick)="service.openInsert()">
    </p-button>
  </div>

  <app-character-list></app-character-list>
</div>

<app-character-insert></app-character-insert>
<app-character-detail></app-character-detail>
<app-character-update></app-character-update>
<app-character-remove></app-character-remove>
